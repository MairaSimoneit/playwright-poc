name: Playwright Tests

on:
    push:
        branches:
            - main
            - master

    pull_request:
        branches:
            - main
            - master

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: github-pages
    cancel-in-progress: false

jobs:
    test:
        name: Run Playwright tests and publish dashboard
        runs-on: ubuntu-latest
        timeout-minutes: 60

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chrome

            - name: Run Playwright tests
              run: npx playwright test

            - name: Generate dashboard HTML
              run: |
                  node scripts/generate-dashboard.js

            - name: Copy Playwright report into public-report
              run: |
                  mkdir -p public-report
                  cp -r playwright-report public-report/playwright-report

            - name: Upload Playwright HTML report as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

            - name: Setup GitHub Pages
              if: always() && github.event_name == 'push'
              uses: actions/configure-pages@v5

            - name: Upload public report to GitHub Pages
              if: always() && github.event_name == 'push'
              uses: actions/upload-pages-artifact@v3
              with:
                  path: public-report/

            - name: Deploy public report to GitHub Pages
              if: always() && github.event_name == 'push'
              id: deployment
              uses: actions/deploy-pages@v4
